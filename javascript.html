<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css.css">
    <title>JaVaScript</title>

<style>

body{
    background-image: url(https://img.freepik.com/free-vector/white-abstract-background_23-2148810113.jpg?w=2000);
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: 100% 100%;
    min-height: 100vh;
}

h1{
    font-family: 'Courier New', Courier, monospace;
    text-align: center;   
}

#noidung{
    background-color: aqua;
    height:250px;
    width:100%;
    color:rgb(255, 0, 64);
    border-radius: 30px;
    font-size:25px;
    text-align: center;
    line-height: 250px;
    font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
}

.toanbo{
    display: flex;
}
.nut{
    justify-content: center;
}

@import url(https://fonts.googleapis.com/css?family=BenchNine:700);
.but{
    background-color: #c47135;
    border: none;
    color: #ffffff;
    cursor: pointer;
    display: inline-block;
    font-family: 'BenchNine', Arial, sans-serif;
    font-size: 1em;
    font-size: 22px;
    line-height: 1em;
    margin: 15px 40px;
    outline: none;
    padding: 12px 40px 10px;
    position: relative;
    text-transform: uppercase;
    font-weight: 700;
    height: 50px;
}
button.margin-right {
    margin-right: 20px;
}

.but:before,
.but:after {
  border-color: transparent;
  -webkit-transition: all 0.25s;
  transition: all 0.25s;
  border-style: solid;
  border-width: 0;
  content: "";
  height: 24px;
  position: absolute;
  width: 24px;
}

.but:before {
  border-color: #c47135;
  border-top-width: 2px;
  left: 0px;
  top: -5px;
}

.but:after {
  border-bottom-width: 2px;
  border-color: #c47135;
  bottom: -5px;
  right: 0px;
}

.but:hover,
.but.hover {
  background-color: #c47135;
}

.but:hover:before,
.but.hover:before,
.but:hover:after,
.but.hover:after {
  height: 100%;
  width: 100%;
}

</style>

</head>
<body>
    <h1>Bài tập JavaScript</h1>
    <div calss="box">
        <p id="noidung"></p>
    </div>  
    <div class="toanbo nut">
            <button class="but" type="hienthi margin-right" onclick="hienthi()">Hiển thị </button>

            <button class="but" type="tinhtong margin-right" onclick="tinhtong()">Tính tổng</button>

            <button class="but" type="tinhtongchan" onclick="tinhtongchan()">Tính tổng chẵn</button>
    </div>                          
    <script>
            function hienthi() {
// Giới thiệu tên
                document.getElementById("noidung").innerHTML = "Xin chào! Tôi là : Phạm Minh Trí";
}
            function tinhtong() {
//Tính tổng từ 1 -> 10
                let text=0;
                for(let i=1;i<=10;i++){
                    text +=i;
                }
                document.getElementById("noidung").innerHTML =text;
}
            function tinhtongchan() {
//Tính tổng các số chẳn từ 1 -> 10
                let text=0;
                for(let i=1;i<=10;i++){
                    if(i%2==0){
                        text +=i;
                    }
                }
                document.getElementById("noidung").innerHTML =text;
}
    </script>    
</body>
</html>
