<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaVaScript</title>

<style>

body{
    justify-content: center;
    align-items: center;
    background: #B33771 ;
    min-height: 100vh;
}
.toanbo{
    display:grid;
    justify-content: center;
}
h1{
    font-family: 'Courier New', Courier, monospace;
    text-align: center;
    color: aqua;    
}

#noidung{
    background: red;
    height:250px;
    width:350px;color:yellow;
    font-size:25px;
    text-align: center;
    font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
}

#hienthi{
    background: orangered;
    border-radius: 50%;
    font-size: 20px;
    width: 350px;
    padding: 10px 0px 10px 15px;
    cursor: pointer;
    border: none;
    padding: 15px;
}

#tinhtong{
    background: yellow;
    border-radius: 50%;
    font-size: 20px;
    width: 350px;
    padding: 10px 0px 10px 15px;
    cursor: pointer;
    border: none;
    padding: 15px;
}

#tinhtongchan{
    background: brown;
    border-radius: 50%;
    font-size: 20px;
    width: 350px;
    padding: 10px 0px 10px 15px;
    cursor: pointer;
    border: none;
    padding: 15px;
}

</style>

</head>
<body>
    <h1>Bài tập JavaScript</h1>
    <div class="toanbo">
        <p id="noidung"></p>
        <div>
            <button id="hienthi" type="hienthi" onclick="hienthi()">Hiển thị </button>
        </div>
        <div>
            <button id="tinhtong" type="tinhtong" onclick="tinhtong()">Tính tổng</button>
        </div>
        <div>
            <button id="tinhtongchan" type="tinhtongchan" onclick="tinhtongchan()">Tính tổng chẵn</button>
        </div>
    </div>                          
    <script>
            function hienthi() {
// Giới thiệu tên
                document.getElementById("noidung").innerHTML = "Xin chào. Tôi là : Phạm Minh Trí";
}
            function tinhtong() {
//Tính tổng từ 1 -> 10
                let text=0;
                for(let i=1;i<=10;i++){
                    text +=i;
                }
                document.getElementById("noidung").innerHTML ="Tính tổng từ 1 đến 10" ;
}
            function tinhtongchan() {
//Tính tổng các số chẳn từ 1 -> 10
                let text=0;
                for(let i=1;i<=10;i++){
                    if(i%2==0){
                        text +=i;
                    }
                }
                document.getElementById("noidung").innerHTML ="Tính các số chẵn" ;
}
    </script>    
</body>
</html>
