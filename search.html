<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Hello</title>

    <style>
        header{background-color:#ffe6e6;height:50px;}
		/* section{background-color:black;height:500px;color:white;} */
		footer{background-color: #e0e0d1;height:50px;}
        /* *{
            box-sizing: border-box;
        } */
        div{
            display: flex;
            justify-content: center;
            align-items: center;
            background: #B33771 ;
            min-height: 100vh;
        }
        #search-box{
            background: #fff;
            border-radius: 30px;
        }
        #search-box #search-text{
            border: none;
            outline: none;
            background: none;
            font-size: 18px;
            width: 0;
            padding: 0;
            transition: all 0.25s ease-in-out;
        }
        #search-box #search-text, #search-box #search-text:valid{
            width: 300px;
            padding: 10px 0px 10px 15px;
        }
        #search-box #search-btn{
            background-color: rgb(161, 15, 15);
            cursor: pointer;
            border: none;
            padding: 15px;
            border-radius: 50%;
            font-size: 18px;
        }
    </style>

</head>
<body>
    <header>
        <nav>
            <a href="https://phamminhtri20.github.io/">Trang chủ</a>
        </nav>
    </header>

    <section>
        <div>
        <form action="" id="search-box">
            <input type="text" id="search-text"placeholder="Bạn muốn tìm gì?" required>
            <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
        </div>
    </section>

    <footer>
        <p>Em Chưa Làm</p>
    </footer>
</body>
</html>
