<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <title>Home</title>
    <style>
body {
    background-image: url('https://www.lg.com/vn/images/FN6/AV-TONEFree-FN6-29-Selectable-Colors-Desktop.jpg');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: 100% 100%;
    display: block;
    margin: 0px;
    margin-top: 0px;
    margin-right: 0px;
    margin-bottom: 0px;
    margin-left: 0px;
}
.container{
    max-width: 960px;
    margin: 0px auto;
}
  #header{
    background-color: #131921;
}
nav{
    display: flex;
    justify-content: space-between;
    justify-items: center;
}
#logo{
    padding: 5px 0px;
}
#logo img{
    max-width: 50px;
    height: auto;
}

#main-menu{
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
}
#main-menu li{
    position: relative;
}
#main-menu li a{
    color: #f8f8f8;
    display: block;
    padding: 18px 20px;
    text-decoration: none;
}
#main-menu ul.sub-menu{
    position: absolute;
    background-color: #131921;
    padding: 15px 0px;
    list-style: none;
    width: 200px;
    border: 1px solid;
    display: none;
}
#main-menu li:hover>ul.sub-menu{
    display: block;
}
#main-menu ul.sub-menu a{
    padding: 8px 15px;
    border: 1px solid #d3cbff;
    left: 0;
}
#main-menu ul.sub-menu li:hover>a{
    border-bottom: 1px solid #6e6e6e;
}
#main-menu ul.sub-menu li:last-child a{
    border: none;
}
#main-menu ul.sub-menu ul.sub-menu{
    left: 200px;
    top : -15px;
}
#main-menu>li>a{
    position: relative;
}
#main-menu>li>a::before{
    content: "";
    height: 4px;
    width: 0px;
    background: rgb(9, 255, 0);
    position: absolute;
    bottom: 0px;
    left: 0px;
    transition: 0.25s cubic-bezier(0.075, 0.82, 0.165, 1);
}
#main-menu>li:hover>a::before{
    width: 100%;
}
#main-menu>li.has-child::after{
    font-family: "Font Awesome 5 Free";
    font-weight: 900;
    content: "\f107";
    color: #858585;
    position: absolute;
    top: 0px;
    right: 0px;
    padding: 18px 0px;
}
#main-menu .sub-menu li:hover>a{
    color: crimson;
}
#main-menu .sub-menu>li.has-child::after{
    font-family: "Font Awesome 5 Free";
    font-weight: 900;
    content: "\f105";
    color: #858585;
    position: absolute;
    top: 0px;
    right: 10px;
    padding: 8px 0px; 
}
#main-menu .sub-menu>li.has-child:hover::after{
    color: crimson;
}
#search-box{
    background: #fff;
    border-radius: 30px;
}
#search-box #search-text{
    border: none;
    outline: none;
    background: none;
    font-size: 18px;
    width: 0;
    padding: 0;
    transition: all 0.25s ease-in-out;
}
#search-box #search-text, #search-box #search-text:valid{
    width: 150px;
    }
#search-box #search-btn{
    background-color: rgb(255, 255, 255);
    cursor: pointer;
    border: none;
    border-radius: 50%;
    font-size: 18px;
}
#toggle {
        display: none;
        background: #131921;
        color: #fff;
        text-align: right;
        padding: 10px;
        font-size: 20px;
        cursor: pointer;
    }
    @media screen and (max-width: 768px) {
        #main-menu {
            flex-direction: column;
            text-align: center;
        }
        #toggle {
            display: block;
        }
        nav {
            display: none;
        }
    }
</style>
    <script>
        $(document).ready(function() {
            $('#toggle').click(function() {
                $('nav').slideToggle();
            });
        })
    </script>
    </style>
</head>

<body>
    <header>
        <div id="wrapper">
            <div id="header">
                <div id="toggle">
                    <i class="fas fa-bars"></i>
                </div>
                <nav class="container">
                    <a href="" id="logo">
                        <img src="https://scontent.fdad1-2.fna.fbcdn.net/v/t1.15752-9/279415069_421397796482135_5405203816598297310_n.png?_nc_cat=105&ccb=1-6&_nc_sid=ae9488&_nc_ohc=KAGmrA6tv-MAX-FK5AN&_nc_ht=scontent.fdad1-2.fna&oh=03_AVIz6TD-S-7W6XSk_LWoz6osKfoD4nPGfxFp8Tytal7d5g&oe=62A44F2E" alt="Image-logo">
                    </a>
                    <ul id="main-menu">
                        <li><a href="https://phamminhtri20.github.io/index.html">Trang Chủ</a></li>
                        <li><a href="https://phamminhtri20.github.io/learn.html">Học Tập</a></li>
                        <li><a href="https://phamminhtri20.github.io/lienhe.html">Liên Hệ</a></li>
                    <li><br><form action="" id="search-box">
                        <input type="text" id="search-text"placeholder="Tìm Kiếm" required>
                        <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </form></li>
                </nav>

            </div>
        </div>
        <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
        <script>
            $(document).ready(function(){
                $('.sub-menu').parent('li').addClass('has-child');
            });
        </script>
    </header>
    <section>

    </section>
    <footer>

    </footer>
</body>
</html>
