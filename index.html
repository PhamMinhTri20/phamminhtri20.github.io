<!DOCTYPE html>
<html lang="en">
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Profile</title>
    <style>
        body {
    background-image: url('https://th.bing.com/th/id/R.7e7e0265cfcbcd3d008d5959da02c0bc?rik=G%2ft33plpJ23vLA&pid=ImgRaw&r=0');
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-size: 100% 100%;
}
@import url('https://fonts.googleapis.com/css?family=Josefin+Sans&display=swap');
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  list-style: none;
  font-family: 'Josefin Sans', sans-serif;
}

body{
   background-color: #f3f3f3;
}

.wrapper{
  position: absolute;
  left: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  width: 700px;
  display: flex;
  box-shadow: 0 1px 20px 0 rgba(69,90,100,.08);
}

.wrapper .left{
  width: 35%;
  background: linear-gradient(to right,#000000,#7e7878);
  padding: 30px 25px;
  border-top-left-radius: 5px;
  border-bottom-left-radius: 5px;
  text-align: center;
  color: #fff;
}

.wrapper .left img{
  border-radius: 5px;
  margin-bottom: 10px;
}

.wrapper .left h4{
  margin-bottom: 10px;
}

.wrapper .left p{
  font-size: 12px;
}

.wrapper .right{
  width: 65%;
  background: #fff;
  padding: 30px 25px;
  border-top-right-radius: 5px;
  border-bottom-right-radius: 5px;
}

.wrapper .right .info,
.wrapper .right .projects{
  margin-bottom: 25px;
}

.wrapper .right .info h3,
.wrapper .right .projects h3{
    margin-bottom: 15px;
    padding-bottom: 5px;
    border-bottom: 1px solid #e0e0e0;
    color: #353c4e;
  text-transform: uppercase;
  letter-spacing: 5px;
}

.wrapper .right .info_data,
.wrapper .right .projects_data{
  display: flex;
  justify-content: space-between;
}

.wrapper .right .info_data .data,
.wrapper .right .projects_data .data{
  width: 45%;
}

.wrapper .right .info_data .data h4,
.wrapper .right .projects_data .data h4{
    color: #353c4e;
    margin-bottom: 5px;
}

.wrapper .right .info_data .data p,
.wrapper .right .projects_data .data p{
  font-size: 13px;
  margin-bottom: 10px;
  color: #919aa3;
}

.wrapper .social_media ul{
  display: flex;
}

.wrapper .social_media ul li{
  width: 45px;
  height: 45px;
  background: linear-gradient(to right,#000000,#ffffff);
  margin-right: 10px;
  border-radius: 5px;
  text-align: center;
  line-height: 45px;
}

.wrapper .social_media ul li a{
  color :#fff;
  display: block;
  font-size: 18px;
}
    </style>
</head>
<body>
    <script src="https://kit.fontawesome.com/b99e675b6e.js"></script>

        <div class="wrapper">
            <div class="left">
                <img src="https://avatars.githubusercontent.com/u/103323420?v=4" alt="user" width="100">

                 <p>CD-CNTT15B</p>
            </div>
            <div class="right">
                <div class="info">
                    <h3>Information</h3>
                    <div class="info_data">
                         <div class="data">
                            <h4>Phone</h4>
                            <p>0326-xXx-xXx</p>
                         </div>
                         <div class="data">
                           <h4>Email</h4>
                            <p>phamminhtridelicacy@gmail.com</p>
                      </div>
                      
                    </div>
                </div>
              
              <div class="projects">
                    <h3>Projects</h3>
                    <div class="projects_data">
                         <div class="data">
                            <h4>Recent</h4>
                            <p>Web Programming</p>
                         </div>
                         <div class="data">
                           <h4>Plan</h4>
                            <p>Web Design</p>
                      </div>
                    </div>
                </div>
              
                <div class="social_media">
                    <ul>
                      <li><a href="https://facebook.com/Hi.Im.Mr.Trii"><i class="fab fa-facebook-f"></i></a></li>
                      <li><a href="https://phamminhtri20.github.io"><i class="fa-brands fa-github"></i></a></li>

                  </ul>

        </div>
</body>
</html>
