<!DOCTYPE html>
<html>
    <head>
        <style>
    @import url('https://fonts.googleapis.com/css?family=Noto+Sans:400,400i,700,700i&subset=greek-ext');
body{
	background-image: url("https://img.freepik.com/free-vector/white-abstract-background_23-2148810113.jpg?w=2000");
	background-position: center;
    background-origin: content-box;
    background-repeat: no-repeat;
    background-size: cover;
	min-height:100vh;
	font-family: 'Noto Sans', sans-serif;
}
h1{
    font-family:cursive;
}
label{
    font-family: cursive;
}
#noidung{
    background-color: aqua;
    height:250px;
    width:100%;
    color:rgb(255, 0, 64);
    border-radius: 30px;
    font-size:25px;
    text-align: center;
    line-height: 250px;
    font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
}

.text-center{
	color:black;	
	text-transform:uppercase;
    font-size: 23px;
    margin: -50px 0 80px 0;
    display: block;
    text-align: center;
    font-family: cursive;
}
.box{
	position:absolute;
	left:50%;
	top:50%;
	transform: translate(-50%,-50%);
    background-color: rgba(0, 0, 0, 0.89);
	border-radius:3px;
	padding:70px 100px;
}
.input-container{
	position:relative;
	margin-bottom:25px;
}
.input-container label{
	position:absolute;
	top:0px;
	left:0px;
	font-size:16px;
	color: black;	
	transition: all 0.5s ease-in-out;
}
.input-container input{ 
  border:0;
  border-bottom:1px solid #555;  
  background:transparent;
  width:15%;
  padding:8px 0 5px 0;
  font-size:16px;
  color: black;
}
.input-container input:focus{ 
 border:none;	
 outline:none;
 border-bottom:1px solid #e74c3c;	
}

.input-container input:focus ~ label,
.input-container input:valid ~ label{
	top:-20px;
	font-size:20px;
	
}

.toanbo{
    display: flex;
}
.nut{
    justify-content: center;
}

@import url(https://fonts.googleapis.com/css?family=BenchNine:700);
.but{
    background-color: #c47135;
    border: none;
    color: #ffffff;
    cursor: pointer;
    display: inline-block;
    font-family: 'BenchNine', Arial, sans-serif;
    font-size: 1em;
    font-size: 22px;
    line-height: 1em;
    margin: 15px 40px;
    outline: none;
    padding: 12px 40px 10px;
    position: relative;
    text-transform: uppercase;
    font-weight: 700;
    height: 50px;
}
button.margin-right {
    margin-right: 20px;
}

.but:before,
.but:after {
  border-color: transparent;
  -webkit-transition: all 0.25s;
  transition: all 0.25s;
  border-style: solid;
  border-width: 0;
  content: "";
  height: 24px;
  position: absolute;
  width: 24px;
}

.but:before {
  border-color: #c47135;
  border-top-width: 2px;
  left: 0px;
  top: -5px;
}

.but:after {
  border-bottom-width: 2px;
  border-color: #c47135;
  bottom: -5px;
  right: 0px;
}

.but:hover,
.but.hover {
  background-color: #c47135;
}

.but:hover:before,
.but.hover:before,
.but:hover:after,
.but.hover:after {
  height: 100%;
  width: 100%;
}


</style>
    </head>
    <body>
        <h1>Bài tập JavaScript</h1><br>

        <form id="myForm" action="">
        <span class="text-center">Vui lòng nhập giá trị sau : </span>
        <div class="input-container">
        <input id="textbox1" name="textname" required="" type="text" /></p>
        <label>Vui lòng nhập tên</label>
        </div>
        <div class="input-container">
            <input id="textbox2" name="n" required="" type="text" /></p>
            <label>Nhập n</label>
        </div>
       </form>
        <p id="noidung"></p>
      <div class="toanbo nut">
        <button class="but" type="hienthi margin-right" onclick="hienthi()">Hiển thị </button>

        <button class="but" type="tinhtong margin-right" onclick="tinhtong()">Tính tổng</button>

        <button class="but" type="tinhtongchan" onclick="tinhtongchan()">Tính tổng chẵn</button>
</div>

        <script>
          function hienthi() {
// Giới thiệu tên
            document.getElementById("noidung").innerHTML = "Xin chao. Toi là " + document.forms["myForm"].textname.value;
          }
         function tinhtong() {
              //Tính tổng từ 1 -> n
document.getElementById("noidung").innerHTML ="Tổng từ 1 đến " +  document.forms["myForm"].n.value + " là: ";
          }
        function tinhtongchan() {
              //Tính tổng các số chẳn từ 1 -> n
document.getElementById("noidung").innerHTML ="Tổng các số chẵn từ 1 đến " +  document.forms["myForm"].n.value + " là: ";
          }
        </script>    
     </body>
</html>
